name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GO_PMTILES_VERSION: 1.30.3

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build the embedded UI so build.rs bakes it into the binary, matching
      # what ships.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend into static
        run: ./scripts/sync-ui.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit and integration tests
        run: cargo test

      - name: Fetch go-pmtiles for the e2e suite
        run: |
          mkdir -p bin
          curl -sL "https://github.com/protomaps/go-pmtiles/releases/download/v${GO_PMTILES_VERSION}/go-pmtiles_${GO_PMTILES_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xzf - -C bin pmtiles

      - name: End-to-end extract pipeline
        run: cargo test --test e2e_extract -- --ignored

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  release:
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

      - name: Capture released version
        id: ver
        run: echo "version=${RELEASE_VERSION:-}" >> "$GITHUB_OUTPUT"

  docker:
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: ubuntu-latest
    env:
      IMAGE: samruff/pmtile-tool
      VERSION: ${{ needs.release.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute tags
        run: echo "MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)" >> "$GITHUB_ENV"

      - name: Set version in Cargo.toml
        run: sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: samruff
          password: ${{ secrets.DOCKER_LOGIN_PASSWORD }}

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE:latest" -t "$IMAGE:$VERSION" -t "$IMAGE:$MAJOR_MINOR" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:$MAJOR_MINOR"
