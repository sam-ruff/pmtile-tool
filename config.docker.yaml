listen: 0.0.0.0:8080
martin_listen: 127.0.0.1:3111
data_dir: /data
go_pmtiles_bin: /usr/local/bin/pmtiles
regions_index: /app/assets/geofabrik-index-v1.json
seed_regions:
  - united-kingdom
  - england
limits:
  max_maxzoom: 15
  max_estimated_tiles: 150000000
  max_custom_export_gb: 10
  max_polygon_vertices: 1000
  jobs_per_ip_per_hour: 5
  active_jobs_per_ip: 2
  queue_depth_max: 20
  max_concurrent_extracts: 1
  extract_timeout_minutes: 60
  avg_tile_bytes: 85
  job_rate_limit_per_second: 1
  job_rate_limit_burst: 3
  download_rate_limit_per_second: 20
  download_rate_limit_burst: 100
  # Total writable extract budget (custom exports + cached regions), excluding
  # the planet archive. New jobs evict the least-recently-used finished outputs
  # to stay within this, so a flood of requests can only push out old files.
  data_budget_gb: 70
retention:
  export_ttl_hours: 48
  region_ttl_hours: 48
